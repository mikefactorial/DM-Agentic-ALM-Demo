name: Enforce Source Branch Rules
run-name: 'Check Branch Rules: ${{ github.head_ref }} → ${{ github.base_ref }}'

on:
  pull_request:
    branches:
      - disabled

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check if source branch is allowed to merge to target branch
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          BASE_BRANCH="${{ github.base_ref }}"
          
          echo "PR Details:"
          echo "  Source: $SOURCE_BRANCH"
          echo "  Target: $BASE_BRANCH"
          echo ""
          
          # Define allowed merge paths
          # main branch: develop and hotfix/* can merge
          if [[ "$BASE_BRANCH" == "main" ]]; then
            if [[ "$SOURCE_BRANCH" == "develop" ]] || \
               [[ "$SOURCE_BRANCH" =~ ^hotfix/.+ ]]; then
              echo "✅ Source branch '$SOURCE_BRANCH' is allowed to merge to main"
              exit 0
            else
              echo "❌ ERROR: Only develop and hotfix/* branches can merge to main"
              echo "Current source branch: $SOURCE_BRANCH"
              exit 1
            fi
          fi
          
          echo "❌ Unknown configuration for $BASE_BRANCH"
          exit 1
